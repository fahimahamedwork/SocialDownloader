# Pull Request Check Workflow
# Runs on every pull request to ensure code quality

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    name: PR Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Check Project Structure
        run: |
          echo "📁 Checking project structure..."
          ls -la
          echo ""
          echo "📁 App directory:"
          ls -la app/ || echo "App directory not found"

      - name: Compile Kotlin
        run: ./gradlew compileDebugKotlin --stacktrace

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Generate Build Info
        id: build_info
        run: |
          echo "APK_SIZE=$(du -h app/build/outputs/apk/debug/*.apk | cut -f1)" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## ✅ PR Build Successful

            | Property | Value |
            |----------|-------|
            | Build Time | ${{ steps.build_info.outputs.BUILD_TIME }} |
            | APK Size | ${{ steps.build_info.outputs.APK_SIZE }} |
            | Branch | ${{ github.event.pull_request.head.ref }} |
            | Commit | ${{ github.event.pull_request.head.sha.substring(0, 7) }} |

            **Artifacts:** Download the debug APK from the workflow artifacts.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
