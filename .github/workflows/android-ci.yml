# GitHub Actions CI/CD Workflow for SocialDownloader
name: Android CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find and List APKs
        id: find_apk
        run: |
          echo "Looking for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -type f 2>/dev/null | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          if [ -n "$APK_PATH" ]; then
            echo "APK found at: $APK_PATH"
            ls -la "$APK_PATH"
          else
            echo "No APK found!"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SocialDownloader-Debug
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
