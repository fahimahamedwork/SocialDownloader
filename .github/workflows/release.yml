# Manual Release Workflow
# Trigger this workflow manually to create a release

name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.1)'
        required: true
        type: string
      version_code:
        description: 'Version code (e.g., 2)'
        required: true
        type: number
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Update Version
        run: |
          sed -i "s/versionCode .*/versionCode ${{ github.event.inputs.version_code }}/" app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ github.event.inputs.version_name }}\"/" app/build.gradle

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/SocialDownloader-v${{ github.event.inputs.version_name }}.apk

      - name: Create Git Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app/build.gradle
          git commit -m "chore: bump version to ${{ github.event.inputs.version_name }}"
          git tag -a "v${{ github.event.inputs.version_name }}" -m "Release v${{ github.event.inputs.version_name }}"
          git push origin "v${{ github.event.inputs.version_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: Release v${{ github.event.inputs.version_name }}
          body: |
            ## 🚀 SocialDownloader v${{ github.event.inputs.version_name }}

            ### Installation
            1. Download the APK file
            2. Enable "Install from unknown sources" in your Android settings
            3. Open the APK file to install

            ### Requirements
            - Android 7.0 (API 24) or higher
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
